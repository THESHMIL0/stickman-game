<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Stickman Defender</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #222; touch-action: none;
            font-family: sans-serif; user-select: none;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        
        /* --- MAIN MENU --- */
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #main-menu h1 {
            color: #00ccff; font-size: 40px; margin-bottom: 30px;
            text-shadow: 0px 0px 10px #00ccff, 2px 2px 0px #000;
            text-align: center;
        }
        .menu-btn {
            background: linear-gradient(to bottom, #555, #333); color: white;
            border: 2px solid #888; padding: 12px 30px; font-size: 20px;
            font-weight: bold; border-radius: 10px; margin: 8px; width: 200px;
            cursor: pointer; box-shadow: 0px 4px 6px rgba(0,0,0,0.6);
            transition: transform 0.1s, background 0.1s;
        }
        .menu-btn:active { transform: scale(0.95); background: #444; }
        #btn-play { background: linear-gradient(to bottom, #00ccff, #0088aa); border-color: #00ffff; }

        /* --- IN-GAME UI (Hidden at start) --- */
        #in-game-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #top-ui {
            position: absolute; top: 10px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 0 15px; box-sizing: border-box; color: white; font-weight: bold; text-shadow: 1px 1px 2px black;
        }
        .ui-box {
            background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px;
            border: 2px solid #555; display: flex; flex-direction: column;
        }
        #wave-progress-bar {
            width: 120px; height: 15px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 2px solid #555;
        }
        #wave-progress-fill { height: 100%; width: 0%; background: limegreen; } /* Reset to 0% */
        .currency { display: flex; align-items: center; margin-bottom: 2px; font-size: 14px; }
        
        #settings-btn {
            background-color: #444; color: white; font-size: 24px; border: 2px solid #888;
            border-radius: 50%; width: 45px; height: 45px; display: flex;
            justify-content: center; align-items: center; pointer-events: auto;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        /* Settings Modal */
        #settings-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95); border: 3px solid #00ccff; border-radius: 15px;
            padding: 20px; text-align: center; color: white; pointer-events: auto;
            display: none; flex-direction: column; gap: 15px; min-width: 250px; z-index: 200;
        }
        .modal-btn { padding: 10px 20px; font-size: 18px; font-weight: bold; border-radius: 8px; border: none; cursor: pointer; }
        #install-btn { background-color: #00ccff; color: black; display: none; }
        #close-settings-btn { background-color: #ff3333; color: white; }

        /* Controls */
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; pointer-events: auto; }
        #atk-btn {
            position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px; border-radius: 50%;
            background-color: #ff3333; color: white; font-weight: bold; font-size: 20px; border: 4px solid #880000;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); pointer-events: auto;
        }
        #atk-btn:active { background-color: #ffaaaa; border-color: #ff0000; transform: scale(0.95); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="main-menu">
        <h1>Stickman Defender</h1>
        <button id="btn-play" class="menu-btn">Play</button>
        <button class="menu-btn" onclick="alert('Coming soon!')">Characters</button>
        <button class="menu-btn" onclick="alert('Coming soon!')">Store / Skins</button>
        <button id="btn-menu-settings" class="menu-btn">Settings</button>
    </div>

    <div id="in-game-ui">
        <div id="top-ui">
            <div class="ui-box">
                <div>Wave 1</div>
                <div id="wave-progress-bar"><div id="wave-progress-fill"></div></div>
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="ui-box">
                    <div class="currency"><span>💎</span> 0</div>
                    <div class="currency"><span>🪙</span> 0</div>
                </div>
                <div id="settings-btn">⚙️</div>
            </div>
        </div>
        <div id="joystick-zone"></div>
        <button id="atk-btn">ATK</button>
    </div>

    <div id="settings-modal">
        <h2>Settings</h2>
        <button id="install-btn" class="modal-btn">📥 Install Game</button>
        <button id="close-settings-btn" class="modal-btn">Close</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
