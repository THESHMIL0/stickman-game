<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Stickman Defender</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #111; touch-action: none; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(30,30,50,0.9) 0%, rgba(0,0,0,1) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #main-menu h1 { color: #00ffff; font-size: 50px; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 0px 0px 15px #00ffff, 4px 4px 0px #000; text-align: center; font-weight: 900; text-transform: uppercase; }
        .menu-btn { background: linear-gradient(135deg, #444, #222); color: white; border: 2px solid #666; padding: 15px 40px; font-size: 22px; font-weight: bold; border-radius: 12px; margin: 10px; width: 250px; cursor: pointer; box-shadow: 0px 6px 15px rgba(0,0,0,0.5); transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .menu-btn:active { transform: translateY(4px); box-shadow: 0px 2px 5px rgba(0,0,0,0.5); }
        #btn-play { background: linear-gradient(135deg, #00ccff, #0066aa); border-color: #00ffff; }
        #btn-multi { background: linear-gradient(135deg, #ff00ff, #aa00aa); border-color: #ff88ff; }

        #in-game-ui { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #top-ui { position: absolute; top: 15px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: flex-start; padding: 0 20px; box-sizing: border-box; color: white; font-weight: bold; text-shadow: 2px 2px 4px black; }
        .ui-box { background: linear-gradient(to bottom, rgba(40,40,40,0.8), rgba(20,20,20,0.9)); padding: 10px 15px; border-radius: 10px; border: 2px solid #555; display: flex; flex-direction: column; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        #wave-progress-bar { width: 140px; height: 18px; background: #222; border-radius: 10px; overflow: hidden; margin-top: 8px; border: 2px solid #444; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        #wave-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #32cd32, #00ff00); transition: width 0.3s; }
        .currency { display: flex; align-items: center; margin-bottom: 5px; font-size: 18px; } .currency span { margin-left: 8px; } 
        
        #settings-btn { background: linear-gradient(135deg, #555, #333); color: white; font-size: 24px; border: 2px solid #777; border-radius: 50%; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; pointer-events: auto; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }

        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: radial-gradient(circle, rgba(40,40,50,0.95) 0%, rgba(20,20,25,0.98) 100%); border: 3px solid #00ccff; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); padding: 30px; text-align: center; color: white; pointer-events: auto; display: none; flex-direction: column; gap: 15px; min-width: 280px; z-index: 200; }
        .modal-btn { padding: 12px 20px; font-size: 18px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; text-transform: uppercase; }
        #save-btn { background: linear-gradient(to bottom, #ffcc00, #ff9900); color: black; border: 2px solid #ffdd00; } 
        #install-btn { background: linear-gradient(to bottom, #00ffff, #00aaff); color: black; border: 2px solid #ffffff; display: none; }
        #close-settings-btn, #close-multi-btn { background: linear-gradient(to bottom, #ff4444, #cc0000); color: white; border: 2px solid #ff8888; }

        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 160px; height: 160px; pointer-events: auto; }
        #atk-btn { position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px; border-radius: 50%; background: radial-gradient(circle, #ff5555 0%, #cc0000 100%); color: white; font-weight: 900; font-size: 24px; border: 4px solid #ffaaaa; box-shadow: 0px 8px 20px rgba(0,0,0,0.6); pointer-events: auto; text-shadow: 1px 1px 2px black; }
        #atk-btn:active { background: radial-gradient(circle, #ff7777 0%, #ff0000 100%); transform: translateY(4px); box-shadow: 0px 4px 10px rgba(0,0,0,0.6); border-color: #ffffff; }
        
        #game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(100, 0, 0, 0.85); justify-content: center; align-items: center; flex-direction: column; z-index: 300; color: white; text-shadow: 2px 2px 4px black; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="main-menu">
        <h1>Stickman Defender</h1>
        <button id="btn-play" class="menu-btn">Single Player</button>
        <button id="btn-multi" class="menu-btn">Multiplayer</button>
        <button id="btn-menu-settings" class="menu-btn">Settings</button>
    </div>

    <div id="multiplayer-modal" class="modal">
        <h2 style="color: #ff00ff; text-transform: uppercase; margin-top: 0;">Select Player</h2>
        <button id="btn-p1" class="modal-btn" style="background: #00ffff; color: black;">Host Game (Player 1)</button>
        <button id="btn-p2" class="modal-btn" style="background: #ff00ff; color: white;">Join Friend (Player 2)</button>
        <button id="close-multi-btn" class="modal-btn">Back</button>
    </div>

    <div id="in-game-ui">
        <div id="top-ui">
            <div class="ui-box">
                <div id="wave-text" style="font-size: 20px;">Wave 1</div>
                <div id="wave-progress-bar"><div id="wave-progress-fill"></div></div>
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="ui-box">
                    <div class="currency">💎 <span id="gem-count">0</span></div>
                    <div class="currency">🪙 <span id="coin-count">0</span></div>
                </div>
                <div id="settings-btn">⚙️</div>
            </div>
        </div>
        <div id="joystick-zone"></div>
        <button id="atk-btn">FIRE</button>
    </div>

    <div id="settings-modal" class="modal">
        <h2 style="margin-top: 0; text-transform: uppercase; color: #00ffff; letter-spacing: 1px;">Settings</h2>
        <button id="save-btn" class="modal-btn">💾 Save Progress</button>
        <button id="install-btn" class="modal-btn">📥 Install Game App</button>
        <button id="close-settings-btn" class="modal-btn">Close Menu</button>
    </div>

    <div id="game-over-screen">
        <h1 id="game-over-title" style="font-size: 60px; color: #ff3333; text-shadow: 0 0 20px red, 4px 4px 0px black;">BASE DESTROYED</h1>
        <button class="menu-btn" onclick="location.reload()">Return to Menu</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js?v=4"></script>
</body>
</html>
