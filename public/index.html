<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplayer Stickman Fighter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333; /* Dark background */
            touch-action: none; /* Prevent default touch actions like scrolling */
        }
        canvas {
            display: block; /* Removes bottom margin on canvas */
            background-color: #f0f0f0;
        }
        /* Container for the joystick on the bottom left */
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            z-index: 10;
        }
        /* Container for the attack button on the bottom right */
        #attack-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(255, 0, 0, 0.5);
            border: 4px solid red;
            color: white;
            font-weight: bold;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            z-index: 10;
        }
        /* Make button pop when pressed */
        #attack-btn:active {
            background-color: rgba(255, 0, 0, 0.8);
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-zone"></div>
    <div id="attack-btn">ATK</div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    
    <script src="game.js"></script>
</body>
</html>
